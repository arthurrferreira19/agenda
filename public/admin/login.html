<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maximum Help | Admin Login</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <div class="floating-icons">
    <div class="float-ic float-1" aria-hidden="true"><i data-lucide="receipt"></i></div>
    <div class="float-ic float-2" aria-hidden="true"><i data-lucide="shield-check"></i></div>
    <div class="float-ic float-3" aria-hidden="true"><i data-lucide="calculator"></i></div>
    <div class="float-ic float-4" aria-hidden="true"><i data-lucide="bar-chart-3"></i></div>
  </div>

  <main class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="row w-100 justify-content-center">
      <div class="col-12 col-md-10 col-lg-8 col-xl-7 fade-up">
        <div class="glass p-4 p-md-5">
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
            <div>
              <div class="brand-badge mb-3">
                <span class="brand-dot"></span>
                <span class="fw-semibold">Maximum Help</span>
              </div>
              <h1 class="mh-title mb-1">Acesso do Administrador</h1>
              <p class="mh-sub mb-0">Entre com seu e-mail e senha para acessar o painel.</p>
            </div>
            <div class="icon-pill">
              <i data-lucide="lock"></i>
            </div>
          </div>

          <hr class="hr-soft my-4">

          <div id="alertBox" class="mb-3"></div>

          <form id="formLogin" class="needs-validation" novalidate>
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label fw-semibold" for="email">E-mail</label>
                <div class="input-group">
                  <span class="input-group-text"><i data-lucide="mail"></i></span>
                  <input id="email" name="email" type="email" class="form-control" placeholder="admin@empresa.com" autocomplete="username" required>
                </div>
                <div class="invalid-feedback">Informe um e-mail válido.</div>
              </div>

              <div class="col-12">
                <label class="form-label fw-semibold" for="password">Senha</label>
                <div class="input-group">
                  <span class="input-group-text"><i data-lucide="key-round"></i></span>
                  <input id="password" name="password" type="password" class="form-control" placeholder="••••••••" autocomplete="current-password" minlength="6" required>
                  <button class="btn btn-outline-secondary" type="button" id="btnTogglePass" aria-label="Mostrar senha">
                    <i id="eyeIcon" data-lucide="eye"></i>
                  </button>
                </div>
                <div class="invalid-feedback">Informe a senha (mínimo 6 caracteres).</div>
              </div>

              <div class="col-12 d-flex align-items-center justify-content-between flex-wrap gap-2">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="1" id="remember">
                  <label class="form-check-label" for="remember">Lembrar de mim</label>
                </div>
                <a class="small-link" href="#" id="forgotLink">
                  Esqueceu a senha?
                </a>
              </div>

              <div class="col-12 d-grid mt-2">
                <button class="btn btn-wine text-white py-2 fw-semibold" id="btnLogin" type="submit">
                  <span class="d-inline-flex align-items-center gap-2">
                    <i data-lucide="log-in"></i>
                    Entrar no Painel
                  </span>
                </button>
              </div>

              <div class="col-12">
                <p class="mb-0 small text-secondary">
                  Dica: este login aceita apenas usuários com <span class="fw-semibold">role ADMIN</span>.
                </p>
              </div>
            </div>
          </form>

        </div>

        <div class="text-center mt-3 small text-secondary">
          © <span id="year"></span> Maximum Help • Acesso seguro
        </div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/adminLogin.js"></script>
</body>
</html>
